<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота 3</title>
</head>
<body>

    <div>
        <h2>1</h2>
        <p>Результати першого завдання дивіться в консолі розробника (F12 -> Console).</p>
    </div>

    <div>
        <h2>2</h2>
    </div>

    <div>
        <h2>3</h2>
    </div>

    <div>
        <h2>4</h2>
    </div>

    <script>
        // 1
        function processArray(array, callback) {
            let result = [];
            for (let i = 0; i < array.length; i++) {
                result.push(callback(array[i]));
            }
            return result;
        }

        function doubleElement(element) {
            return element * 2;
        }

        function reverseElement(element) {
            return String(element).split('').reverse().join('');
        }

        console.log("Завдання 1 (double):", processArray([1, 2, 3, 4, 5], doubleElement));
        console.log("Завдання 1 (reverse):", processArray(["hello", "world"], reverseElement));


        // 2
        function filterArray(array, callback) {
            let result = [];
            for (let i = 0; i < array.length; i++) {
                if (callback(array[i]) === true) {
                    result.push(array[i]);
                }
            }
            return result;
        }

        function isEven(number) {
            return number % 2 === 0;
        }

        function isShortWord(word) {
            return String(word).length <= 4;
        }

        console.log("Завдання 2 (isEven):", filterArray([1, 2, 3, 4, 5], isEven));
        console.log("Завдання 2 (isShortWord):", filterArray(["cat", "elephant", "dog", "bird"], isShortWord));


        // 3
        function washDishes() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("Посуд вимито");
                }, 2000);
            });
        }

        function cleanRoom() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("Кімнату прибрано");
                }, 4000);
            });
        }

        function makeDinner() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("Вечеря приготована");
                }, 7000);
            });
        }

        washDishes()
            .then((msg1) => {
                console.log("Завдання 3:", msg1);
                return cleanRoom();
            })
            .then((msg2) => {
                console.log("Завдання 3:", msg2);
                return makeDinner();
            })
            .then((msg3) => {
                console.log("Завдання 3:", msg3);
            });


        // 4
        function sortArray(array) {
            return new Promise((resolve, reject) => {
                if (array.length === 0) {
                    reject("Масив порожній");
                } else {
                    setTimeout(() => {
                        let sorted = [...array].sort((a, b) => a - b);
                        resolve(sorted);
                    }, 2000);
                }
            });
        }

        sortArray([5, 1, 4, 2, 3])
            .then((sorted) => console.log("Завдання 4 (успіх):", sorted))
            .catch((error) => console.log("Завдання 4 (помилка):", error));

        sortArray([])
            .then((sorted) => console.log("Завдання 4 (успіх):", sorted))
            .catch((error) => console.log("Завдання 4 (помилка):", error));
    </script>
</body>
</html>
